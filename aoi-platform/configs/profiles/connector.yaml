name: connector
display_name_zh: 连接器 / 排针 / 端子
display_name_en: Connector / Pin Header / Terminal
description: |
  USB / Type-C / FPC / pin-header inspection. Edge-detection localizer + YOLO pin
  detection + highpass for bent-pin / scratched pad.

defect_categories:
  - { id: 1, code: bent_pin,    label_zh: 引脚弯曲, label_en: Bent Pin,     severity: critical, group: structural, color: "#CC0000" }
  - { id: 2, code: missing_pin, label_zh: 缺针,    label_en: Missing Pin,  severity: critical, group: structural, color: "#990000" }
  - { id: 3, code: solder_short,label_zh: 短路,    label_en: Solder Short, severity: critical, group: structural, color: "#FF3300" }
  - { id: 4, code: scratch,     label_zh: 划伤,    label_en: Scratch,      severity: major,    group: surface,    color: "#FF9900" }
  - { id: 5, code: oxide,       label_zh: 氧化,    label_en: Oxidation,    severity: major,    group: surface,    color: "#CC9966" }
  - { id: 6, code: contam,      label_zh: 污染,    label_en: Contamination,severity: minor,    group: contamination, color: "#996633" }

localizer:
  strategy: threshold

roi_detector:
  strategy: yolo_box
  model_path: models/connector/pin_detector.pt
  params:
    conf: 0.40
    max_det: 200

routes:
  - name: yolo_cls
    enabled: true
    params:
      model_path: models/connector/defect_classifier.pt
      confidence_threshold: 0.60
      ok_class: ok
  - name: highpass_edge
    enabled: true
    params:
      edge_density_threshold: 0.10
  - name: opencv_anomaly
    enabled: true
    params:
      dark_threshold: 50
      bright_threshold: 230

fusion:
  strategy: any_positive
  min_routes_for_ng: 1
